<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- NEO text with neon effect -->
  <defs>
    <linearGradient id="neonGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ccff00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Stylized NEO letters -->
  <path d="M 30 100 Q 50 50, 70 100 L 70 150" stroke="url(#neonGreen)" stroke-width="8" fill="none" filter="url(#glow)"/>
  <path d="M 90 80 L 90 150 L 130 150 L 130 80 L 90 80 M 90 110 L 130 110" stroke="url(#neonGreen)" stroke-width="8" fill="none" filter="url(#glow)"/>
  <ellipse cx="155" cy="115" rx="20" ry="35" stroke="url(#neonGreen)" stroke-width="8" fill="none" filter="url(#glow)"/>
</svg>
